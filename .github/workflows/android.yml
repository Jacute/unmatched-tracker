name: Android build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: "6.11.0"
  QT_ARCH: "android_arm64_v8a"

  NDK_VERSION: "27.2.12479018"
  ANDROID_NATIVE_API: "android-33"
  ANDROID_MIN_SDK_VERSION: "33"
  ANDROID_ABI: "arm64-v8a"

  BUILD_DIR: "build"
  PACKAGE_NAME: "com.jacute.unmatched_tracker"

jobs:
  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          yes | "$SDKMANAGER" --licenses >/dev/null || true

          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${NDK_VERSION}"

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: ${{ env.QT_ARCH }}
          cache: true
          modules: qtimageformats
          extra: "--autodesktop"

      - name: Configure debug build
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          "$QT_ROOT_DIR/bin/qt-cmake" \
            -S . \
            -B "$BUILD_DIR" \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" \
            -DANDROID_ABI="$ANDROID_ABI" \
            -DANDROID_PLATFORM="$ANDROID_NATIVE_API" \
            -DQT_ANDROID_MIN_SDK_VERSION="$ANDROID_MIN_SDK_VERSION" \
            -DPACKAGE_NAME="$PACKAGE_NAME" \
            -DAPI_URL="$API_URL"

      - name: Build debug APK
        run: |
          cmake --build "$BUILD_DIR" \
            --target apk \
            --parallel

      - name: Collect APK
        run: |
          mkdir -p dist

          find "$BUILD_DIR/android-build/build/outputs" \
            -type f \
            -name "*.apk" \
            -print \
            -exec cp {} dist/ \;

          test -n "$(find dist -name '*.apk' -print -quit)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unmatched-tracker-debug-arm64-v8a
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Build signed release
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          yes | "$SDKMANAGER" --licenses >/dev/null || true

          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${NDK_VERSION}"

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: ${{ env.QT_ARCH }}
          cache: true
          modules: qtimageformats
          extra: "--autodesktop"

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_STORE_PASS"

          printf '%s' "$KEYSTORE_BASE64" \
            | base64 --decode \
            > "$RUNNER_TEMP/upload-key.jks"

          chmod 600 "$RUNNER_TEMP/upload-key.jks"

          keytool -list \
            -keystore "$RUNNER_TEMP/upload-key.jks" \
            -storepass:env KEYSTORE_STORE_PASS  \
            >/dev/null

      - name: Configure release build
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          "$QT_ROOT_DIR/bin/qt-cmake" \
            -S . \
            -B build-release \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" \
            -DANDROID_ABI="$ANDROID_ABI" \
            -DANDROID_PLATFORM="$ANDROID_NATIVE_API" \
            -DQT_ANDROID_MIN_SDK_VERSION="$ANDROID_MIN_SDK_VERSION" \
            -DPACKAGE_NAME="$PACKAGE_NAME" \
            -DAPI_URL="$API_URL" \
            -DQT_ANDROID_SIGN_APK=ON \
            -DQT_ANDROID_SIGN_AAB=ON

      - name: Build signed APK and AAB
        env:
          QT_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-key.jks
          QT_ANDROID_KEYSTORE_ALIAS: ${{ vars.ANDROID_KEYSTORE_ALIAS }}
          QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
          QT_ANDROID_KEYSTORE_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_KEY_PASS }}
        run: |
          cmake --build build-release \
            --target apk \
            --parallel

          cmake --build build-release \
            --target aab \
            --parallel

      - name: Collect release packages
        run: |
          mkdir -p dist

          find build-release/android-build/build/outputs \
            -type f \
            \( -name "*.apk" -o -name "*.aab" \) \
            -print \
            -exec cp {} dist/ \;

          test -n "$(find dist -type f -print -quit)"

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: unmatched-tracker-${{ github.ref_name }}-arm64-v8a
          path: |
            dist/*.apk
            dist/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.apk \
            dist/*.aab \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
